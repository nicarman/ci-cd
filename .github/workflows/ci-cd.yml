name: C++ CI/CD Pipeline

# Trigger on push to main and on pull requests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

# Environment variables used across jobs
env:
  DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
  IMAGE_NAME: ${{ github.event.repository.name }}
  VERSION: ${{ github.ref_name }}

jobs:
  # JOB 1: Build and Test
  build-and-test:
    name: Build and Test C++ Application
    runs-on: ubuntu-latest
    
    steps:
    # Step 1: Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    # Step 2: Install dependencies
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libgtest-dev build-essential
    
    # Step 3: Configure with CMake
    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake ..
    
    # Step 4: Build the application
    - name: Build
      run: |
        cd build
        cmake --build . --target my_app
    
    # Step 5: Run tests
    - name: Run tests
      run: |
        cd build
        cmake --build . --target run_tests
        ./run_tests
    
    # Step 6: Upload build artifacts (for download)
    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: my_app_executable
        path: build/my_app

  # JOB 2: Docker Build and Push
  docker-build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test  # Wait for tests to pass
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          ${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # JOB 3: Create GitHub Release
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Read version from file
      id: get_version
      run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT
    
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: my_app_executable
        path: ./executable
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.get_version.outputs.VERSION }}
        name: Release v${{ steps.get_version.outputs.VERSION }}
        body: |
          ## 🚀 Automated Release
          
          This release was automatically created by the CI/CD pipeline.
          
          ### What's included:
          - Docker image: `${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest`
          - Linux executable (attached below)
          
          ### How to run:
          ```bash
          # Using Docker
          docker run ${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          
          # Direct execution (after downloading)
          chmod +x my_app
          ./my_app

          files: |
./executable/my_app
env:
GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}